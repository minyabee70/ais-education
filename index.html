<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIS Signal Flow 3D Simulator</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-log" style="position:fixed; top:0; left:0; width:100%; height:100%; background:red; color:white; z-index:9999; display:none; white-space:pre-wrap; padding:20px; font-family:monospace; overflow:auto;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerText += '\n' + e.message + '\n' + e.filename + ':' + e.lineno;
      });
      const oldError = console.error;
      console.error = function(...args) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerText += '\nConsole Error: ' + args.join(' ');
        oldError.apply(console, args);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
